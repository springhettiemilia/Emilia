<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rio - Scaletta 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #ced4da; --header-bg: #1a1a1a; --card: #ffffff; --accent: #00adb5; --text-main: #222; --text-sub: #495057; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; touch-action: manipulation; }
        .top-header { background: var(--header-bg); color: white; width: 100%; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        .logo-svg { width: 120px; height: auto; margin-bottom: 5px; }
        h1.title-app { letter-spacing: 4px; font-size: 1.2em; font-weight: 900; text-transform: uppercase; margin: 0; }
        .live-timer { background: #ff4757; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .total-duration-box { background: #343a40; color: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 0.9em; }
        .search-container { width: 100%; max-width: 600px; padding: 0 20px; margin-bottom: 20px; box-sizing: border-box; }
        #searchInput { width: 100%; padding: 15px 20px; border-radius: 15px; border: 2px solid #adb5bd; font-size: 16px; outline: none; box-sizing: border-box; }
        .page { display: none; flex-direction: column; align-items: center; min-height: 100vh; }
        .active { display: flex; }
        .main-content { width: 100%; max-width: 600px; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: #495057; color: white; }
        .song-item { background: var(--card); padding: 20px; margin: 10px 0; width: 100%; border-radius: 18px; display: flex; align-items: center; gap: 15px; border-left: 8px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.08); box-sizing: border-box; }
        .song-info b { font-size: 1.1em; color: #000; display: block; }
        .song-info span { color: var(--text-sub); font-size: 0.9em; }
        .content-area { width: 92%; max-width: 800px; background: var(--card); border-radius: 25px; padding: 30px; min-height: 60vh; margin-bottom: 120px; position: relative; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .info-field { background: #f1f3f5; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; }
        .info-field label { font-size: 0.7em; text-transform: uppercase; color: #868e96; display: block; }
        .info-field div { font-weight: bold; font-size: 1.1em; outline: none; }
        .floating-tools { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.2); cursor: pointer; font-size: 24px; }
        .tool-btn.active { background: var(--accent); color: white; }
        #detailText { white-space: pre-wrap; min-height: 300px; outline:none; margin-top:20px; }
    </style>
</head>
<body>

    <div id="pageList" class="page active">
        <header class="top-header">
            <h1 class="title-app">RIO SCALETTA</h1>
        </header>
        <div class="live-timer" id="timerBtn">⏱️ LIVE: <span id="timerDisplay">00:00:00</span></div>
        <div class="total-duration-box">DURATA TOTALE: <span id="totalTimeDisplay">00:00</span></div>
        <div class="search-container"><input type="text" id="searchInput" placeholder="Cerca brano..."></div>
        <div class="main-content">
            <div class="button-group">
                <button class="btn btn-add" id="addBtn">+ AGGIUNGI BRANO</button>
                <button class="btn btn-pdf" id="pdfBtn">📄 ESPORTA PDF</button>
            </div>
            <div id="songContainer"></div>
        </div>
    </div>

    <div id="pageDetail" class="page">
        <div style="width: 100%; padding: 20px; display: flex; justify-content: space-between;">
            <button id="backBtn" style="background:#333; color:white; border:none; padding:12px 20px; border-radius:12px;">← TORNA</button>
        </div>
        <div class="content-area">
            <h2 id="detailTitle" contenteditable="true">Titolo</h2>
            <div id="detailAuthor" contenteditable="true">Autore</div>
            <div class="info-grid">
                <div class="info-field"><label>Tonalità</label><div id="detailKey" contenteditable="true">-</div></div>
                <div class="info-field"><label>Durata</label><div id="detailDuration" contenteditable="true">0:00</div></div>
            </div>
            <div id="detailText" contenteditable="true">Testo...</div>
            <canvas id="noteCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
        </div>
        <div class="floating-tools">
            <button id="penBtn" class="tool-btn">✏️</button>
            <button id="eraserBtn" class="tool-btn">🧹</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAZIONE CORRETTA PER REGIONE EUROPA
        const firebaseConfig = {
            apiKey: "AIzaSyDJR-zhA_jIZAvmv52Vj1q7FEBc4MOReZQ",
            authDomain: "rio-2026.firebaseapp.com",
            databaseURL: "https://rio-2026-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "rio-2026",
            appId: "1:129621603967:web:e650e7172abfc944ab714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'songs');

        let songs = [];
        let currentSongId = null;

        // Caricamento Dati
        onValue(songsRef, (snapshot) => {
            const data = snapshot.val();
            songs = data ? Object.keys(data).map(k => ({...data[k], firebaseKey: k})).sort((a,b) => (a.order || 0) - (b.order || 0)) : [];
            renderList();
        });

        function renderList() {
            const container = document.getElementById('songContainer');
            container.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="song-info" style="flex-grow:1"><b>${s.title}</b><span>${s.author}</span></div>
                                 <button onclick="window.delSong('${s.firebaseKey}')" style="background:none; border:none; color:#ccc;">✕</button>`;
                div.onclick = (e) => { if(e.target.tagName !== 'BUTTON') showDetail(s.firebaseKey); };
                container.appendChild(div);
            });
        }

        // Tasto Aggiungi
        document.getElementById('addBtn').onclick = () => {
            const newRef = push(songsRef);
            set(newRef, { title: "Nuovo Brano", author: "Artista", text: "", key: "-", duration: "0:00", order: songs.length })
            .catch(e => alert("Errore: " + e.message));
        };

        function showDetail(key) {
            currentSongId = key;
            const s = songs.find(x => x.firebaseKey === key);
            document.getElementById('detailTitle').innerText = s.title;
            document.getElementById('detailAuthor').innerText = s.author;
            document.getElementById('detailKey').innerText = s.key;
            document.getElementById('detailDuration').innerText = s.duration;
            document.getElementById('detailText').innerHTML = s.text;
            document.getElementById('pageList').classList.remove('active');
            document.getElementById('pageDetail').classList.add('active');
        }

        document.getElementById('backBtn').onclick = () => {
            if(currentSongId) {
                update(ref(db, 'songs/' + currentSongId), {
                    title: document.getElementById('detailTitle').innerText,
                    author: document.getElementById('detailAuthor').innerText,
                    key: document.getElementById('detailKey').innerText,
                    duration: document.getElementById('detailDuration').innerText,
                    text: document.getElementById('detailText').innerHTML
                });
            }
            document.getElementById('pageDetail').classList.remove('active');
            document.getElementById('pageList').classList.add('active');
        };

        window.delSong = (key) => { if(confirm("Elimina?")) remove(ref(db, 'songs/' + key)); };
    </script>
</body>
</html>
