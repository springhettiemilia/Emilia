<!DOCTYPE html> 
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rio - Scaletta 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #ced4da; --header-bg: #1a1a1a; --card: #ffffff; --accent: #00adb5; --text-main: #222; --text-sub: #495057; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; touch-action: manipulation; }
        .top-header { background: var(--header-bg); color: white; width: 100%; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        h1.title-app { letter-spacing: 4px; font-size: 1.2em; font-weight: 900; text-transform: uppercase; margin: 0; }
        .live-timer { background: #ff4757; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .total-duration-box { background: #343a40; color: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 0.9em; }
        .search-container { width: 100%; max-width: 600px; padding: 0 20px; margin-bottom: 20px; box-sizing: border-box; }
        #searchInput { width: 100%; padding: 15px 20px; border-radius: 15px; border: 2px solid #adb5bd; font-size: 16px; outline: none; box-sizing: border-box; }
        .page { display: none; flex-direction: column; align-items: center; min-height: 100vh; }
        .active { display: flex; }
        .main-content { width: 100%; max-width: 600px; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: #495057; color: white; }
        .song-item { background: var(--card); padding: 20px; margin: 10px 0; width: 100%; border-radius: 18px; display: flex; align-items: center; justify-content: space-between; border-left: 8px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.08); box-sizing: border-box; cursor: pointer; transition: transform 0.1s; }
        .song-item:active { transform: scale(0.98); }
        .song-info b { font-size: 1.1em; color: #000; display: block; }
        .song-info span { color: var(--text-sub); font-size: 0.9em; }
        .content-area { width: 92%; max-width: 800px; background: var(--card); border-radius: 25px; padding: 30px; min-height: 60vh; margin-bottom: 40px; position: relative; box-sizing: border-box; }
        #detailText { white-space: pre-wrap; min-height: 300px; outline:none; margin-top:20px; border-top: 1px solid #eee; padding-top: 15px; font-size: 1.1em; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="pageList" class="page active">
        <header class="top-header"><h1 class="title-app">RIO SCALETTA</h1></header>
        <div class="live-timer">⏱️ LIVE: <span id="timerDisplay">00:00:00</span></div>
        <div class="total-duration-box">DURATA TOTALE: <span id="totalTimeDisplay">00:00</span></div>
        <div class="search-container"><input type="text" id="searchInput" placeholder="Cerca brano o artista..."></div>
        <div class="main-content">
            <div class="button-group">
                <button class="btn btn-add" id="addBtn">+ AGGIUNGI BRANO</button>
                <button class="btn btn-pdf">📄 ESPORTA PDF</button>
            </div>
            <div id="songContainer"></div>
        </div>
    </div>

    <div id="pageDetail" class="page">
        <div style="width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box;">
            <button id="backBtn" style="background:#333; color:white; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:bold;">← SALVA E TORNA</button>
        </div>
        <div class="content-area">
            <h2 id="detailTitle" contenteditable="true" style="margin:0; outline:none;">Titolo</h2>
            <div id="detailAuthor" contenteditable="true" style="color:var(--accent); font-weight:bold; margin-top:5px; outline:none;">Autore</div>
            <div id="detailText" contenteditable="true">Caricamento testo...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configurazione aggiornata per il nuovo database
        const firebaseConfig = {
            apiKey: "AIzaSyDJR-zhA_jIZAvmv52Vj1q7FEBc4MOReZQ",
            authDomain: "scaletta-rio-2026.firebaseapp.com",
            databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "scaletta-rio-2026",
            appId: "1:129621603967:web:e650e7172abfc944ab714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'songs');
        let currentSongKey = null;

        // --- CARICAMENTO E RENDERING ---
        onValue(songsRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('songContainer');
            container.innerHTML = '';
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const s = data[key];
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerHTML = `
                        <div class="song-info">
                            <b>${s.title}</b>
                            <span>${s.author}</span>
                        </div>
                        <button class="del-btn" data-key="${key}" style="background:none; border:none; color:#ddd; font-size:24px; cursor:pointer; padding:5px 10px;">&times;</button>
                    `;

                    // Apri dettaglio al click
                    div.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('del-btn')) {
                            showDetail(key, s);
                        }
                    });

                    // Elimina brano
                    div.querySelector('.del-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`Eliminare "${s.title}"?`)) {
                            remove(ref(db, 'songs/' + key));
                        }
                    });

                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color:gray;">Nessun brano in scaletta.</p>';
            }
        });

        // --- AGGIUNGI BRANO ---
        document.getElementById('addBtn').onclick = () => {
            const newRef = push(songsRef);
            set(newRef, {
                title: "Nuovo Brano",
                author: "Artista",
                text: "Inserisci qui il testo...",
                order: Date.now()
            }).catch(err => alert("Errore Firebase: " + err.message));
        };

        // --- GESTIONE DETTAGLIO ---
        function showDetail(key, s) {
            currentSongKey = key;
            document.getElementById('detailTitle').innerText = s.title;
            document.getElementById('detailAuthor').innerText = s.author;
            document.getElementById('detailText').innerText = s.text;
            
            document.getElementById('pageList').classList.remove('active');
            document.getElementById('pageDetail').classList.add('active');
            window.scrollTo(0, 0);
        }

        document.getElementById('backBtn').onclick = () => {
            if (currentSongKey) {
                const updates = {};
                updates['/songs/' + currentSongKey + '/title'] = document.getElementById('detailTitle').innerText;
                updates['/songs/' + currentSongKey + '/author'] = document.getElementById('detailAuthor').innerText;
                updates['/songs/' + currentSongKey + '/text'] = document.getElementById('detailText').innerText;
                
                update(ref(db), updates).then(() => {
                    document.getElementById('pageDetail').classList.remove('active');
                    document.getElementById('pageList').classList.add('active');
                });
            }
        };

        // --- FUNZIONE RICERCA ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.song-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        });

    </script>
</body>
</html>
