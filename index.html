<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rio - Scaletta 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --bg: #ced4da; 
            --header-bg: #1a1a1a; 
            --card: #ffffff; 
            --accent: #00adb5; 
            --text-main: #222; 
            --text-sub: #495057;
            --pastello-rosa: #ffc2d1;
            --pastello-azzurro: #bde0fe;
        }

        body { 
            font-family: 'Arial', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            touch-action: manipulation; 
        }
        
        .top-header {
            background: var(--header-bg);
            color: white;
            width: 100%;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .logo-svg { width: 120px; height: auto; margin-bottom: 5px; }
        h1.title-app { letter-spacing: 4px; font-size: 1.2em; font-weight: 900; text-transform: uppercase; margin: 0; }

        .live-timer {
            background: #ff4757; color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }

        .total-duration-box {
            background: #343a40; color: white; padding: 10px 20px; border-radius: 12px;
            margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 0.9em;
        }

        .search-container { width: 100%; max-width: 600px; padding: 0 20px; margin-bottom: 20px; box-sizing: border-box; }
        #searchInput {
            width: 100%; padding: 15px 20px; border-radius: 15px; border: 2px solid #adb5bd;
            font-size: 16px; outline: none; box-sizing: border-box;
        }

        .page { display: none; flex-direction: column; align-items: center; min-height: 100vh; }
        .active { display: flex; }

        .main-content { width: 100%; max-width: 600px; padding: 0 20px 40px 20px; box-sizing: border-box; }

        .button-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .btn { 
            flex: 1; border: none; padding: 15px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: #495057; color: white; }

        .song-item { 
            background: var(--card); padding: 20px; margin: 10px 0; width: 100%; 
            border-radius: 18px; display: flex; align-items: center; gap: 15px; 
            border-left: 8px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.08); box-sizing: border-box;
        }
        .song-item.hidden { display: none; }
        .song-info b { font-size: 1.1em; color: #000; display: block; }
        .song-info span { color: var(--text-sub); font-size: 0.9em; }
        .song-meta-preview { font-size: 0.8em; color: var(--accent); font-weight: bold; margin-top: 4px; }

        .content-area { 
            width: 92%; max-width: 800px; background: var(--card); border-radius: 25px; 
            padding: 30px; min-height: 60vh; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 120px; position: relative;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .info-field { background: #f1f3f5; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; }
        .info-field label { font-size: 0.7em; text-transform: uppercase; color: #868e96; display: block; margin-bottom: 2px; }
        .info-field div { font-weight: bold; font-size: 1.1em; min-height: 1.2em; outline: none; }

        .media-link-container { margin: 10px 0; display: flex; gap: 10px; align-items: center; }
        #mediaUrlInput { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-play-media { background: #1DB954; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .text-tools { display: flex; gap: 10px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; }
        .highlight-btn { width: 35px; height: 35px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }

        .floating-tools { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .tool-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="pageList" class="page active">
        <header class="top-header">
            <svg class="logo-svg" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
                <text x="50%" y="30" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" fill="white">RIO</text>
                <rect x="20" y="32" width="60" height="3" fill="#00adb5" />
            </svg>
            <h1 class="title-app">SCALETTA</h1>
        </header>

        <div class="live-timer" onclick="toggleTimer()">
            <span>⏱️ LIVE:</span> <span id="timerDisplay">00:00:00</span>
        </div>

        <div class="total-duration-box">
            DURATA TOTALE: <span id="totalTimeDisplay">00:00</span>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cerca brano..." oninput="filterSongs()">
        </div>

        <div class="main-content">
            <div class="button-group">
                <button class="btn btn-add" onclick="addNewSong()">+ AGGIUNGI BRANO</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">📄 ESPORTA PDF</button>
            </div>
            <div id="songContainer"></div>
        </div>
    </div>

    <div id="pageDetail" class="page">
        <div class="header-detail" style="width: 100%; padding: 20px; display: flex; justify-content: space-between; box-sizing: border-box;">
            <button onclick="showList()" style="background:#333; color:white; border:none; padding:12px 20px; border-radius:12px; font-weight:bold;">← TORNA</button>
            <button onclick="clearCurrentCanvas()" style="background:none; border:none; color: #666;">Pulisci Disegni</button>
        </div>
        
        <div class="content-area" id="editorArea">
            <div class="text-tools">
                <button class="highlight-btn" style="background: #ffff00;" onclick="formatDoc('hiliteColor', '#ffff00')"></button>
                <button class="highlight-btn" style="background: #ffc2d1;" onclick="formatDoc('hiliteColor', '#ffc2d1')"></button>
                <button class="highlight-btn" style="background: #bde0fe;" onclick="formatDoc('hiliteColor', '#bde0fe')"></button>
                <button class="highlight-btn" style="background: #ffffff;" onclick="formatDoc('removeFormat')">❌</button>
            </div>

            <h2 id="detailTitle" contenteditable="true" onblur="saveCurrentSongData()">Titolo</h2>
            <div id="detailAuthor" contenteditable="true" onblur="saveCurrentSongData()">Autore</div>
            
            <div class="info-grid">
                <div class="info-field">
                    <label>Tonalità</label>
                    <div id="detailKey" contenteditable="true" onblur="saveCurrentSongData()">-</div>
                </div>
                <div class="info-field">
                    <label>Durata (min:sec)</label>
                    <div id="detailDuration" contenteditable="true" onblur="saveCurrentSongData()">0:00</div>
                </div>
            </div>

            <div class="media-link-container">
                <input type="text" id="mediaUrlInput" placeholder="Link Spotify/YouTube..." onblur="saveCurrentSongData()">
                <button class="btn-play-media" onclick="openMediaLink()">▶ ASCOLTA</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <div id="detailText" contenteditable="true" onblur="saveCurrentSongData()" style="white-space: pre-wrap; min-height: 300px; outline:none;">Testo...</div>
            
            <div id="canvasContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
                <canvas id="noteCanvas"></canvas>
            </div>
        </div>

        <div class="floating-tools">
            <button id="penBtn" class="tool-btn" onclick="setTool('pen')">✏️</button>
            <button id="eraserBtn" class="tool-btn" onclick="setTool('eraser')">🧹</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJR-zhA_jIZAvmv52Vj1q7FEBc4MOReZQ",
            authDomain: "rio-2026.firebaseapp.com",
            databaseURL: "https://rio-2026-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "rio-2026",
            storageBucket: "rio-2026.firebasestorage.app",
            messagingSenderId: "129621603967",
            appId: "1:129621603967:web:e650e7172abfc944ab714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'songs');

        let songs = [];
        let currentSongId = null;
        let drawing = false;
        let currentTool = null;
        let timerInterval, seconds = 0, timerRunning = false;
        const canvas = document.getElementById('noteCanvas');
        const ctx = canvas.getContext('2d');

        // Caricamento dati iniziale
        onValue(songsRef, (snapshot) => {
            const data = snapshot.val();
            // Trasformiamo l'oggetto Firebase in array e lo ordiniamo per "order"
            if (data) {
                songs = Object.keys(data).map(key => ({...data[key], firebaseKey: key}));
                songs.sort((a, b) => (a.order || 0) - (b.order || 0));
            } else {
                songs = [];
            }
            renderList();
            calculateTotalTime();
        });

        function calculateTotalTime() {
            let totalSeconds = 0;
            songs.forEach(s => {
                if(s.duration && s.duration.includes(':')) {
                    const parts = s.duration.split(':');
                    totalSeconds += (parseInt(parts[0]) * 60) + (parseInt(parts[1]) || 0);
                }
            });
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            document.getElementById('totalTimeDisplay').innerText = h > 0 ? `${h}h ${m}m` : `${m}:${s.toString().padStart(2, '0')}`;
        }

        window.renderList = function() {
            const container = document.getElementById('songContainer');
            container.innerHTML = '';
            songs.forEach((song) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.setAttribute('data-id', song.id);
                div.innerHTML = `
                    <div class="handle" style="cursor:grab; color:#adb5bd; font-size:24px;">☰</div>
                    <div class="song-info" style="flex-grow:1" onclick="showDetail(${song.id})">
                        <b>${song.title}</b>
                        <span>${song.author}</span>
                        <div class="song-meta-preview">${song.key || '-'} | ${song.duration || '0:00'}</div>
                    </div>
                    <button style="background:none; border:none; color:#ccc; font-size:18px;" onclick="deleteSong(event, '${song.firebaseKey}')">✕</button>
                `;
                container.appendChild(div);
            });
        };

        window.filterSongs = function() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.song-item').forEach(item => {
                item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(s));
            });
        };

        window.addNewSong = function() {
            const newId = Date.now();
            const newSongRef = ref(db, 'songs/' + newId);
            const newSong = { 
                id: newId, 
                title: "Nuovo Brano", 
                author: "Artista", 
                text: "", 
                key: "Do", 
                duration: "3:30",
                order: songs.length 
            };
            set(newSongRef, newSong);
        };

        window.showDetail = function(id) {
            currentSongId = id;
            const song = songs.find(s => s.id === id);
            if(!song) return;
            document.getElementById('detailTitle').innerText = song.title;
            document.getElementById('detailAuthor').innerText = song.author;
            document.getElementById('detailKey').innerText = song.key || "-";
            document.getElementById('detailDuration').innerText = song.duration || "0:00";
            document.getElementById('detailText').innerHTML = song.text || "";
            document.getElementById('mediaUrlInput').value = song.mediaUrl || "";
            document.getElementById('pageList').classList.remove('active');
            document.getElementById('pageDetail').classList.add('active');
            
            setTimeout(() => {
                const area = document.getElementById('editorArea');
                canvas.width = area.clientWidth; canvas.height = area.clientHeight;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if(song.drawing) { 
                    let img = new Image(); 
                    img.src = song.drawing; 
                    img.onload = () => ctx.drawImage(img, 0, 0); 
                }
            }, 100);
        };

        window.saveCurrentSongData = function() {
            if(!currentSongId) return;
            const song = songs.find(s => s.id === currentSongId);
            if(song) {
                const updates = {};
                updates['/songs/' + currentSongId + '/title'] = document.getElementById('detailTitle').innerText;
                updates['/songs/' + currentSongId + '/author'] = document.getElementById('detailAuthor').innerText;
                updates['/songs/' + currentSongId + '/key'] = document.getElementById('detailKey').innerText;
                updates['/songs/' + currentSongId + '/duration'] = document.getElementById('detailDuration').innerText;
                updates['/songs/' + currentSongId + '/text'] = document.getElementById('detailText').innerHTML;
                updates['/songs/' + currentSongId + '/mediaUrl'] = document.getElementById('mediaUrlInput').value;
                update(ref(db), updates);
            }
        };

        window.showList = function() { 
            saveCurrentCanvas();
            document.getElementById('pageDetail').classList.remove('active'); 
            document.getElementById('pageList').classList.add('active'); 
        };

        window.toggleTimer = function() {
            if(!timerRunning) {
                timerRunning = true;
                timerInterval = setInterval(() => {
                    seconds++;
                    let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let s = Math.floor(seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
                }, 1000);
                document.querySelector('.live-timer').style.background = '#2ed573';
            } else if(confirm("Resettare il timer?")) {
                clearInterval(timerInterval);
                timerRunning = false; seconds = 0;
                document.getElementById('timerDisplay').innerText = "00:00:00";
                document.querySelector('.live-timer').style.background = '#ff4757';
            }
        };

        window.openMediaLink = function() { 
            const url = document.getElementById('mediaUrlInput').value; 
            if(url) window.open(url, '_blank'); 
        };

        window.formatDoc = function(c, v) { 
            document.execCommand(c, false, v); 
            saveCurrentSongData();
        };

        window.setTool = function(t) { 
            currentTool = (currentTool === t) ? null : t; 
            document.getElementById('penBtn').classList.toggle('active', currentTool === 'pen'); 
            document.getElementById('eraserBtn').classList.toggle('active', currentTool === 'eraser'); 
            document.getElementById('canvasContainer').style.pointerEvents = currentTool ? 'auto' : 'none'; 
        };

        function saveCurrentCanvas() { 
            if(!currentSongId) return;
            const dataUrl = canvas.toDataURL();
            const updates = {};
            updates['/songs/' + currentSongId + '/drawing'] = dataUrl;
            update(ref(db), updates);
        }

        window.clearCurrentCanvas = function() { 
            if(confirm("Pulire disegni?")) { 
                ctx.clearRect(0,0,canvas.width,canvas.height); 
                saveCurrentCanvas(); 
            } 
        };

        window.deleteSong = function(e, firebaseKey) { 
            e.stopPropagation(); 
            if(confirm("Eliminare definitivamente questo brano?")) { 
                remove(ref(db, 'songs/' + firebaseKey));
            } 
        };

        // Gestione Disegno
        canvas.addEventListener('pointerdown', (e) => {
            if(!currentTool) return; drawing = true;
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });
        canvas.addEventListener('pointermove', (e) => {
            if(!drawing || !currentTool) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineCap = 'round'; ctx.lineWidth = currentTool === 'pen' ? 2 : 30;
            ctx.globalCompositeOperation = currentTool === 'pen' ? 'source-over' : 'destination-out';
            ctx.strokeStyle = '#ffff00'; 
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke();
        });
        canvas.addEventListener('pointerup', () => { if(drawing) { drawing = false; saveCurrentCanvas(); } });

        // Ordinamento trascinabile
        new Sortable(document.getElementById('songContainer'), {
            animation: 150, 
            handle: '.handle', 
            onEnd: () => {
                const updates = {};
                document.querySelectorAll('.song-item').forEach((el, index) => {
                    const id = el.getAttribute('data-id');
                    updates['/songs/' + id + '/order'] = index;
                });
                update(ref(db), updates);
            }
        });

        window.downloadPDF = function() {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("SCALETTA RIO 2026", 20, 20);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            songs.forEach((s, i) => {
                doc.text(`${i+1}. ${s.title} - ${s.author} [${s.key}] (${s.duration})`, 20, 40+(i*10));
            });
            doc.save("scaletta.pdf");
        };
    </script>
</body>
</html>
